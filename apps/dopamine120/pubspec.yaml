name: dopamine120
description: "DOPAMINE120 — a dopamine trainer that pairs deliberate effort with a chosen reward to teach the brain to do things other than scrolling."
publish_to: 'none'
version: 0.1.0+1
resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # local packages  
  app_logger:
    path: ../../packages/logger
  core:
    path: ../../packages/core
  dopamine_ui:
    path: ../../packages/dopamine_ui
  platform_bridge:
    path: ../../packages/platform_bridge
  sound_framework:
    path: ../../packages/sound_framework

  # core
  auto_route: ^11.1.0           # For code generation type safe routes
  shared_preferences: ^2.5.5    # For storing simple key-value data like user settings, onboarding status, etc.
  intl: any
  flutter_svg: ^2.0.10          # For rendering the hand-drawn SVG icons
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^10.5.0
  build_runner: ^2.4.0
  flutter_flavorizr: ^2.5.0
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.14.1
  fake_async: ^1.3.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/icons/imagination/
    - assets/sound/dopamine120_op1_pack/
    - assets/sound/focus/
    - assets/sound/focus/groove/
    - assets/sound/deprivation/

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true
